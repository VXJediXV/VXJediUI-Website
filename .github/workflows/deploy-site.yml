name: Deploy Website (main branch)

# Deploys the site on every push to main that touches the docs/ folder.
# Use this for website-only updates (copy changes, design fixes, etc.)
# without needing to cut a new addon release.
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  deploy-site:
    name: Deploy Website
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
